apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-mongodb
  labels:
    app: task-manager-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-mongodb
  template:
    metadata:
      labels:
        app: task-manager-mongodb
    spec:
      automountServiceAccountToken: false
      containers:
      - name: mongodb
        image: mongo:6
        args:
          - --bind_ip_all
        env:
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: task-manager-mongo-secret
                key: MONGO_DB_USERNAME
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: task-manager-mongo-secret
                key: MONGO_DB_PASSWORD
        ports:
          - containerPort: 27017
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
          - name: mongo-data
            mountPath: /data/db
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-mongodb
spec:
  type: ClusterIP
  selector:
    app: task-manager-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
